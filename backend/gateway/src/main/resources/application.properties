spring.application.name=gateway
server.port=8080
# Taille max du body pour les requêtes proxy (ex. signup avec photo)
spring.codec.max-in-memory-size=20MB
#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# CORS is configured in CorsConfig.java only (avoid duplicate headers with user service)

# Routes defined in GatewayApplication.java (user-auth, user-users -> lb://user)

#Log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
