spring.application.name=gateway
# Load shared config from Config Server (8888). Optional so service can still start if config-server is down.
spring.config.import=optional:configserver:http://localhost:8888

# CORS: spring.cloud.gateway.globalcors in application.yml

# Routes defined in GatewayApplication.java
# Smart Notebook: http://localhost:8030 avoids 404 when the service runs locally but is not in Eureka.
# For load-balanced routing: notebook.gateway.uri=lb://notebook
notebook.gateway.uri=http://localhost:8030

# Logs / ports / eureka settings are served by config-server (see backend/microservices/config-repo/gateway.properties)
