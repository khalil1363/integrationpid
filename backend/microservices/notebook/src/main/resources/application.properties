spring.application.name=notebook
spring.config.import=optional:configserver:http://localhost:8888

# Fallback when config-server is off (override in config-repo/notebook.properties)
server.port=8030
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=jdbc:mysql://localhost:3306/notebookdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=000000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Local Ollama (same keys as evaluation service)
ai.ollama.enabled=true
ai.ollama.url=http://localhost:11434/v1/chat/completions
ai.ollama.model=llama3.2
