spring.application.name=config-server
server.port=8888

# Register with Eureka (optional, but useful)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Serve config files from a local folder in this repo
# NOTE: On Windows we need an absolute path. This points to:
# .../backend/microservices/config-repo/
# IMPORTANT: do not use %20 here; use an escaped space in .properties.
spring.cloud.config.server.native.search-locations=file:C:/Users/lpatron/OneDrive/Desktop/Ecole\ SlangEnglish/SlangEngish/PID/backend/microservices/config-repo
spring.profiles.active=native

# Nice-to-have health endpoints
management.endpoints.web.exposure.include=health,info

