spring.application.name=eureka

# Load shared config from Config Server (8888). Optional so service can still start if config-server is down.
spring.config.import=optional:configserver:http://localhost:8888

# Fallbacks (used when config-server is not running)
server.port=8761
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
